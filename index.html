<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longtao Huang</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        h1 { margin: 0; font-size: 2.2rem; }
        .links a { margin-right: 15px; color: #007bff; text-decoration: none; font-size: 0.95rem; }
        section { margin-top: 40px; }
        h2 { border-left: 5px solid #333; padding-left: 15px; font-size: 1.5rem; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        .item-title { font-weight: bold; display: block; }
        footer { margin-top: 60px; font-size: 0.85rem; color: #999; text-align: center; }
    </style>
</head>
<body>

<header id="header-section">
    <h1 id="name-display">Loading...</h1>
    <p id="affiliation-display" style="color: #666;"></p>
    <div class="links" id="contact-links"></div>
</header>

<section id="bio-section">
    <h2>关于我 / Biography</h2>
    <p id="bio-display"></p>
</section>

<section id="edu-section">
    <h2>教育背景 / Education</h2>
    <div id="edu-list"></div>
</section>

<section id="pub-section">
    <h2>发表论文 / Publications</h2>
    <div id="pub-list"></div>
</section>

<section id="award-section">
    <h2>获奖情况 / Awards</h2>
    <div id="award-list"></div>
</section>

<footer>
    <p>&copy; 2026 <span id="footer-name"></span>. Last updated: Feb 2026.</p>
</footer>

<script>
    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            // 1. 基础文字渲染（如果不填则显示默认值）
            document.getElementById('name-display').textContent = data.name || "My Name";
            document.getElementById('affiliation-display').textContent = data.affiliation || "";
            document.getElementById('footer-name').textContent = data.englishName || data.name;

            // 2. 联系方式（如果有链接才显示）
            const links = document.getElementById('contact-links');
            let linksHtml = '';
            if(data.email) linksHtml += `<a href="mailto:${data.email}">Email</a>`;
            if(data.scholar) linksHtml += `<a href="${data.scholar}" target="_blank">Google Scholar</a>`;
            if(data.github) linksHtml += `<a href="${data.github}" target="_blank">GitHub</a>`;
            links.innerHTML = linksHtml;

            // 3. 通用渲染函数：renderSection(数据数组, 列表容器ID, 章节ID, 渲染逻辑)
            const renderSection = (items, listId, sectionId, htmlGenerator) => {
                const section = document.getElementById(sectionId);
                const list = document.getElementById(listId);
                
                if (items && items.length > 0) {
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = htmlGenerator(item);
                        list.appendChild(div);
                    });
                } else {
                    section.style.display = 'none'; // 数据为空，直接隐藏整个板块
                }
            };

            // 渲染“关于我”（单独逻辑）
            if(!data.bio) document.getElementById('bio-section').style.display = 'none';
            else document.getElementById('bio-display').textContent = data.bio;

            // 渲染教育背景
            renderSection(data.education, 'edu-list', 'edu-section', (edu) => `
                <span class="item-title">${edu.school}</span>
                <span>${edu.degree} (${edu.time})</span>
            `);

            // 渲染论文
            renderSection(data.publications, 'pub-list', 'pub-section', (pub) => `
                <span class="item-title">${pub.title}</span>
                <span>${pub.authors}</span><br>
                <em style="color:#666">${pub.venue}</em> 
                ${pub.link !== "#" ? `<a href="${pub.link}" target="_blank" style="color:#007bff; font-size:0.8rem">[Link]</a>` : ''}
            `);

            // 渲染获奖情况
            renderSection(data.awards, 'award-list', 'award-section', (award) => `
                <span>• ${award}</span>
            `);

        })
        .catch(err => console.error("数据加载失败:", err));
</script>

</body>
</html>
