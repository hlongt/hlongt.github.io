<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hlt</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* 让内容垂直排列 */
        }
        p {
            font-size: 24px;
        }
        a {
            margin-top: 20px; /* 给链接和文本之间增加一点间距 */
            font-size: 18px;
            text-decoration: none;
            color: #007bff; /* 设置链接颜色 */
        }
        a:hover {
            text-decoration: underline; /* 鼠标悬停时显示下划线 */
        }
    </style>
</head>
<body>
    <p>Hey here, I am currently building my personal website : )</p>
    <a href="https://hlongt.github.io/focus-timer/">点击这里访问我的计时器应用</a>
</body>
</html>
