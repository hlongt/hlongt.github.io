<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hlt</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #f0f0f5;
            color: #333;
            position: relative; 
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            max-width: 600px; 
            width: 90%; 
            box-sizing: border-box;
            margin: 20px; 
        }

        p {
            font-size: 28px;
            font-weight: 500;
            color: #333;
            margin-bottom: 24px; 
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #0078d4; 
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            transition: background-color 0.3s, box-shadow 0.3s; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        a:hover {
            background-color: #005ba1; 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        a:active {
            transform: translateY(2px); 
        }

        /* 响应式设计：调整移动设备上的布局 */
        @media (max-width: 600px) {
            p {
                font-size: 24px; 
                margin-bottom: 20px;
            }

            a {
                font-size: 16px;
                padding: 10px 20px;
            }

            .container {
                padding: 20px; 
        }

        /* 更小屏幕的优化，比如小型手机或竖屏模式 */
        @media (max-width: 400px) {
            p {
                font-size: 20px;
            }

            a {
                font-size: 14px;
                padding: 8px 16px;
            }
        }


       .contact {
            font-size: 16px;
            color: #555;
            margin-top: 20px;
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
            background: none;
            box-shadow: none;
        }
        .contact a {
            color: #0078d4;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Hey Here 2026 🐎</p>
        <a href="https://hlongt.github.io/focus-timer/">点击这里访问专注计时🍅</a>
    </div>

    <div class="contact">
        <p><a href="mailto:longtao.huang@outlook.com">📫Contact me via email to longtao.huang@outlook.com</a></p>
    </div>
</body>
</html>
