<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hlt</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #f8f8f8, #e1e1e1);
            color: #333;
        }

        p {
            font-size: 28px;
            font-weight: 500;
            margin: 0;
            color: #333;
        }

        a {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0078d4;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        a:hover {
            background-color: #005ba1;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        a:active {
            transform: translateY(2px);
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 30px;
            border-radius: 24px;
            background: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 600px) {
            p {
                font-size: 22px;
            }

            a {
                font-size: 16px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p>2026马到功成🐎 新年快乐🎉 </p>
        <p>Hey here, I am currently building my personal website : )</p>
        <a href="https://hlongt.github.io/focus-timer/">点击这里访问专注计时🍅</a>
    </div>
</body>
</html>
