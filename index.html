<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hlt</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to bottom right, #f0f0f5, #dde1f0);
            color: #333;
            position: relative; 
        }

        .container {
            text-align: left;
            padding: 50px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            max-width: 800px; 
            width: 90%; 
            box-sizing: border-box;
            margin: 20px;
        }

        p {
            font-size: 20px;
            line-height: 1.4; 
            font-weight: 400;
            color: #555;
            margin-bottom: 24px;
            white-space: nowrap;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #0078d4; 
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s, box-shadow 0.3s; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        a:hover {
            background-color: #005ba1; 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        a:active {
            transform: translateY(2px); 
        }

        /* 响应式设计：调整移动设备上的布局 */
        @media (max-width: 600px) {
            p {
                font-size: 18px; 
            }

            a {
                font-size: 16px;
            }

            .container {
                padding: 20px; 
            }
        }

        /* 更小屏幕的优化 */
        @media (max-width: 400px) {
            p {
                font-size: 16px;
            }

            a {
                font-size: 14px;
                padding: 8px 16px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <p>“你走过的路，或许平缓，或许漫长</p>
        <p> 那些风吹过的日子，有的留在记忆里，有的随风远去</p>
        <p> 有些答案，你已找到，有些心愿，还在路上</p>
        <p> 不管快慢，每一步都作数，都是时间温柔的回答</p>
        <p> 交给时光的一切，都是没办法遣返的，这也是人生的逻辑"</p>
        <p>祝好</p>
        <a href="https://hlongt.github.io/focus-timer/">点击这里访问专注计时🍅</a>
    </div>
</body>
</html>
