<!DOCTYPE html> 
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hlt</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; 
            font-family: 'Georgia', serif;
            background-color: #f0f0f5; 
            color: #333;
            font-size: 16px;
            display: grid;  
            justify-items: center;  
            align-items: center;  
        }

        .container {
            text-align: left;
            padding: 3rem;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            box-sizing: border-box;
            margin: 20px;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 400;
            color: #555;
            margin-bottom: 1.5rem;
            white-space: pre;
        }

        a {
            display: block;
            padding: 0.5rem 1rem;
            background-color: #0078d4;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 1rem auto;
            width: fit-content;
        }

        a:hover {
            background-color: #005ba1;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        a:active {
            transform: translateY(2px);
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }
            .container {
                padding: 2rem;
            }
            p {
                font-size: 1rem;
            }
            a {
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p>“  你走过的路，或许平缓，或许漫长</p>
        <p>   那些风吹过的日子，有的留在记忆里，有的随风远去</p>
        <p>   有些答案，你已找到，有些心愿，还在路上</p>
        <p>   不管快慢，每一步都作数，都是时间温柔的回答</p>
        <p>   交给时光的一切，都是没办法遣返的，这也是人生的逻辑  ”</p>
        <a href="https://hlongt.github.io/focus-timer/">点击这里访问专注计时🍅</a>
    </div>
</body>
</html>
